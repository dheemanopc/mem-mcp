# Alembic configuration for mem-mcp database migrations

[loggers]
keys = root,sqlalchemy.engine

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy.engine]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url =
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s
version_path_separator = :
version_locations =
sqlalchemy.track_on_connect =
render_as_batch = false
