# pg_hba.conf for mem-mcp.
# Per spec §8.1: scram-sha-256 from localhost only; no remote.

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Local socket (peer auth for postgres OS user only — for emergency operator access)
local   all             postgres                                peer
local   all             all                                     scram-sha-256

# Loopback IPv4
host    mem_mcp         mem_app         127.0.0.1/32            scram-sha-256
host    mem_mcp         mem_maint       127.0.0.1/32            scram-sha-256
host    postgres        postgres        127.0.0.1/32            scram-sha-256

# Loopback IPv6
host    mem_mcp         mem_app         ::1/128                 scram-sha-256
host    mem_mcp         mem_maint       ::1/128                 scram-sha-256

# Replication slot — none in v1
# host  replication     all             127.0.0.1/32            scram-sha-256

# Reject everything else explicitly
host    all             all             0.0.0.0/0               reject
host    all             all             ::/0                    reject
