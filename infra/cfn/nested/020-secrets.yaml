AWSTemplateFormatVersion: '2010-09-09'
Description: 'mem-mcp 020-secrets — KMS alias passthrough + SSM String parameter placeholders. SecureStrings are operator-created post-deploy.'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: KMS
        Parameters:
          - KmsKeyAlias
      - Label:
          default: Identity
        Parameters:
          - OperatorEmail
          - OperatorIpCidr
  SecureStringParametersToCreate:
    Description: >
      The following SSM SecureString parameters MUST be created by the operator
      AFTER stack deploy, using `aws ssm put-parameter --type SecureString --key-id alias/mem-mcp`.
      CloudFormation cannot create SecureString values safely. See infra/cfn/README.md.
    Parameters:
      - /mem-mcp/db/password
      - /mem-mcp/db/maint_password
      - /mem-mcp/cognito/web_client_secret
      - /mem-mcp/cognito/google_client_id
      - /mem-mcp/cognito/google_client_secret
      - /mem-mcp/internal/lambda_shared_secret
      - /mem-mcp/backup/gpg_passphrase
      - /mem-mcp/web/session_secret
      - /mem-mcp/web/link_state_secret

Parameters:
  KmsKeyAlias:
    Type: String
    Default: alias/mem-mcp
    Description: Operator-created CMK alias (T-0.7). Stack does not create this.
    AllowedPattern: '^alias/[a-zA-Z0-9/_-]+$'

  OperatorEmail:
    Type: String
    Description: Email used as SES sender (e.g., anand@dheemantech.com)
    AllowedPattern: '^[^@\s]+@[^@\s]+\.[^@\s]+$'

  OperatorIpCidr:
    Type: String
    Description: CIDR for operator SSH (must match the value passed to 010-network)
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}/[0-9]{1,2}$'

Resources:
  CognitoRegionParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /mem-mcp/cognito/region
      Type: String
      Value: !Ref AWS::Region
      Description: AWS region where Cognito user pool lives (ap-south-1)
      Tags:
        Project: mem-mcp
        Component: secrets

  SesFromEmailParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /mem-mcp/ses/from_email
      Type: String
      Value: !Ref OperatorEmail
      Description: SES sender email
      Tags:
        Project: mem-mcp
        Component: secrets

  OperatorCidrParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /mem-mcp/ops/operator_cidr
      Type: String
      Value: !Ref OperatorIpCidr
      Description: Operator SSH CIDR
      Tags:
        Project: mem-mcp
        Component: secrets

Outputs:
  KmsKeyAlias:
    Description: KMS key alias
    Value: !Ref KmsKeyAlias

  KmsKeyArn:
    Description: KMS key ARN (computed from alias)
    Value: !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:${KmsKeyAlias}'

  OperatorCidrParameterName:
    Description: SSM parameter name for operator CIDR
    Value: !Ref OperatorCidrParameter

  SesFromEmailParameterName:
    Description: SSM parameter name for SES from email
    Value: !Ref SesFromEmailParameter

  CognitoRegionParameterName:
    Description: SSM parameter name for Cognito region
    Value: !Ref CognitoRegionParameter
