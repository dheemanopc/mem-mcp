AWSTemplateFormatVersion: '2010-09-09'
Description: 'mem-mcp 080-observability — CloudWatch log groups, SNS topic, initial alarms, budget, dashboard.'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Observability
        Parameters:
          - OperatorEmail
          - Ec2InstanceId
          - KmsKeyAlias
          - LogRetentionDays
          - AuditLogRetentionDays
      - Label:
          default: Cost Controls
        Parameters:
          - MonthlyBudgetUsd

Parameters:
  OperatorEmail:
    Type: String
    Description: Operator email for SNS notifications
    AllowedPattern: '^[^@\s]+@[^@\s]+\.[^@\s]+$'

  Ec2InstanceId:
    Type: AWS::EC2::Instance::Id
    Description: EC2 instance ID (from 060-compute stack) for status/CPU alarms

  KmsKeyAlias:
    Type: String
    Default: alias/mem-mcp
    Description: KMS key alias for log group encryption
    AllowedPattern: '^alias/[a-zA-Z0-9/_-]+$'

  LogRetentionDays:
    Type: Number
    Default: 30
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90, 120, 150, 180, 365, 400, 545, 731, 1827, 3653]
    Description: Retention period for app, web, and access logs

  AuditLogRetentionDays:
    Type: Number
    Default: 90
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90, 120, 150, 180, 365, 400, 545, 731, 1827, 3653]
    Description: Retention period for audit and Lambda PreSignUp logs

  MonthlyBudgetUsd:
    Type: Number
    Default: 50
    MinValue: 10
    MaxValue: 1000
    Description: Monthly cost budget; 80% threshold triggers SNS notification

Resources:
  # ============================================================================
  # SNS Topic for Ops Alerts
  # ============================================================================

  OpsSnsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: mem-mcp-ops
      KmsMasterKeyId: !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:${KmsKeyAlias}'
      Tags:
        - Key: Project
          Value: mem-mcp
        - Key: Component
          Value: observability

  OpsEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      TopicArn: !Ref OpsSnsTopic
      Endpoint: !Ref OperatorEmail

  # ============================================================================
  # CloudWatch Log Groups (KMS-encrypted)
  # ============================================================================

  AppLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /mem-mcp/app
      RetentionInDays: !Ref LogRetentionDays
      KmsKeyId: !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:${KmsKeyAlias}'
      Tags:
        - Key: Project
          Value: mem-mcp
        - Key: Component
          Value: observability

  WebLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /mem-mcp/web
      RetentionInDays: !Ref LogRetentionDays
      KmsKeyId: !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:${KmsKeyAlias}'
      Tags:
        - Key: Project
          Value: mem-mcp
        - Key: Component
          Value: observability

  AccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /mem-mcp/access
      RetentionInDays: !Ref LogRetentionDays
      KmsKeyId: !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:${KmsKeyAlias}'
      Tags:
        - Key: Project
          Value: mem-mcp
        - Key: Component
          Value: observability

  AuditLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /mem-mcp/audit
      RetentionInDays: !Ref AuditLogRetentionDays
      KmsKeyId: !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:${KmsKeyAlias}'
      Tags:
        - Key: Project
          Value: mem-mcp
        - Key: Component
          Value: observability

  PreSignUpLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /mem-mcp/lambda/presignup
      RetentionInDays: !Ref AuditLogRetentionDays
      KmsKeyId: !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:${KmsKeyAlias}'
      Tags:
        - Key: Project
          Value: mem-mcp
        - Key: Component
          Value: observability

  # ============================================================================
  # CloudWatch Alarms — EC2 & AWS-emitted metrics
  # ============================================================================

  # Alarm 1: EC2 status check failed (app down)
  AppDownAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: mem-mcp-app-down
      AlarmDescription: 'EC2 status check failed — instance may be unreachable or unhealthy'
      MetricName: StatusCheckFailed
      Namespace: AWS/EC2
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 2
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: InstanceId
          Value: !Ref Ec2InstanceId
      AlarmActions:
        - !Ref OpsSnsTopic
      TreatMissingData: notBreaching

  # Alarm 2: CPU utilization high
  CpuHighAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: mem-mcp-cpu-high
      AlarmDescription: 'EC2 CPU utilization >80% sustained 15 minutes'
      MetricName: CPUUtilization
      Namespace: AWS/EC2
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: InstanceId
          Value: !Ref Ec2InstanceId
      AlarmActions:
        - !Ref OpsSnsTopic
      TreatMissingData: notBreaching

  # Alarm 3: Backup metric stale (custom metric)
  BackupStaleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: mem-mcp-backup-stale
      AlarmDescription: 'Last successful backup >36 hours ago (metric mem-mcp backup.success)'
      MetricName: backup.success
      Namespace: mem-mcp
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 36
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref OpsSnsTopic
      TreatMissingData: breaching

  # Alarm 4: Bedrock throttle
  BedrockThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: mem-mcp-bedrock-throttle
      AlarmDescription: 'Bedrock model invocations throttled >10 per hour'
      MetricName: InvocationThrottles
      Namespace: AWS/Bedrock
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref OpsSnsTopic
      TreatMissingData: notBreaching

  # ============================================================================
  # CloudWatch Metric Filters (Log-derived metrics)
  # ============================================================================

  # Metric Filter 5: App HTTP 5xx rate
  App5xxMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      FilterPattern: '[timestamp, request_id, ..., status_code = 5*, ...]'
      LogGroupName: !Ref AppLogGroup
      MetricTransformations:
        - MetricName: app.http_5xx_count
          MetricNamespace: mem-mcp/app
          MetricValue: '1'
          DefaultValue: 0

  # Metric Filter 6: Auth failures (401/403)
  AuthFailMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      FilterPattern: '[timestamp, request_id, ..., status_code = 401, ...] || [timestamp, request_id, ..., status_code = 403, ...]'
      LogGroupName: !Ref AppLogGroup
      MetricTransformations:
        - MetricName: auth.failure_count
          MetricNamespace: mem-mcp/app
          MetricValue: '1'
          DefaultValue: 0

  # Metric Filter 7: DCR attempts
  DcrAttemptsMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      FilterPattern: '[timestamp, request_id, ..., "action":"oauth.dcr_register", ...]'
      LogGroupName: !Ref AuditLogGroup
      MetricTransformations:
        - MetricName: oauth.dcr_register_count
          MetricNamespace: mem-mcp/app
          MetricValue: '1'
          DefaultValue: 0

  # Metric Filter 8: Token reuse attempts
  TokenReuseMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      FilterPattern: '[timestamp, request_id, ..., "action":"auth.token_refresh_reuse", ...]'
      LogGroupName: !Ref AuditLogGroup
      MetricTransformations:
        - MetricName: auth.token_refresh_reuse_count
          MetricNamespace: mem-mcp/app
          MetricValue: '1'
          DefaultValue: 0

  # Metric Filter 12: Quota circuit breaker
  QuotaCircuitBreakerMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      FilterPattern: '[timestamp, request_id, ..., "action":"quota.circuit_breaker_tripped", ...]'
      LogGroupName: !Ref AppLogGroup
      MetricTransformations:
        - MetricName: quota.circuit_breaker_tripped_count
          MetricNamespace: mem-mcp/app
          MetricValue: '1'
          DefaultValue: 0

  # ============================================================================
  # CloudWatch Alarms — Log-derived and AWS-native metrics (continued)
  # ============================================================================

  # Alarm 5: App HTTP 5xx rate (>5/min sustained 5min = 25 in 5min window)
  App5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: mem-mcp-app-5xx-rate
      AlarmDescription: 'App HTTP 5xx errors >5 per minute sustained 5 minutes'
      MetricName: app.http_5xx_count
      Namespace: mem-mcp/app
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 25
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref OpsSnsTopic
      TreatMissingData: notBreaching

  # Alarm 6: Auth failure spike (>50/min sustained 10min = 500 in 10min window)
  AuthFailSpikAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: mem-mcp-auth-fail-spike
      AlarmDescription: 'Auth failures (401/403) >50 per minute sustained 10 minutes'
      MetricName: auth.failure_count
      Namespace: mem-mcp/app
      Statistic: Sum
      Period: 600
      EvaluationPeriods: 1
      Threshold: 500
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref OpsSnsTopic
      TreatMissingData: notBreaching

  # Alarm 7: DCR attempts (>20/hour)
  DcrAttemptsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: mem-mcp-dcr-attempts
      AlarmDescription: 'OAuth DCR (dynamic client registration) attempts >20 per hour'
      MetricName: oauth.dcr_register_count
      Namespace: mem-mcp/app
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 20
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref OpsSnsTopic
      TreatMissingData: notBreaching

  # Alarm 8: Token reuse (>0, page-level but routed to email for v1)
  TokenReuseAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: mem-mcp-token-reuse
      AlarmDescription: 'Token refresh reuse detected (auth.token_refresh_reuse>0)'
      MetricName: auth.token_refresh_reuse_count
      Namespace: mem-mcp/app
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref OpsSnsTopic
      TreatMissingData: notBreaching

  # Alarm 9: Tenant isolation test failure (custom metric, 0=pass, 1=fail)
  TenantIsolationTestAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: mem-mcp-tenant-isolation-test-failure
      AlarmDescription: 'Nightly tenant isolation synthetic test failed'
      MetricName: tenant_isolation_test
      Namespace: mem-mcp/security
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref OpsSnsTopic
      TreatMissingData: notBreaching

  # Alarm 10: Disk usage (>80%)
  DiskUsageAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: mem-mcp-disk-usage-high
      AlarmDescription: 'EC2 disk usage >80%'
      MetricName: disk_used_percent
      Namespace: AWS/EC2
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: InstanceId
          Value: !Ref Ec2InstanceId
      AlarmActions:
        - !Ref OpsSnsTopic
      TreatMissingData: notBreaching

  # Alarm 11: SES bounce rate (>5%)
  SesBounceRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: mem-mcp-ses-bounce-rate
      AlarmDescription: 'SES bounce rate >5%'
      MetricName: Reputation.BounceRate
      Namespace: AWS/SES
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref OpsSnsTopic
      TreatMissingData: notBreaching

  # Alarm 12: Quota circuit breaker (>0, page-level but routed to email for v1)
  QuotaCircuitBreakerAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: mem-mcp-quota-circuit-breaker
      AlarmDescription: 'Global quota circuit breaker tripped'
      MetricName: quota.circuit_breaker_tripped_count
      Namespace: mem-mcp/app
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref OpsSnsTopic
      TreatMissingData: notBreaching

  # ============================================================================
  # AWS Budget (monthly, $50 limit, 80% threshold = $40)
  # ============================================================================

  MonthlyCostBudget:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: mem-mcp-monthly-50usd
        BudgetLimit:
          Amount: !Ref MonthlyBudgetUsd
          Unit: USD
        TimeUnit: MONTHLY
        BudgetType: COST
      NotificationsWithSubscribers:
        - Notification:
            ComparisonOperator: GREATER_THAN
            NotificationType: FORECASTED
            Threshold: 80
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref OperatorEmail

  # ============================================================================
  # AWS Cost Anomaly Detection
  # ============================================================================

  AnomalyMonitor:
    Type: AWS::CE::AnomalyMonitor
    Properties:
      MonitorName: mem-mcp-cost-anomaly
      MonitorType: DIMENSIONAL
      MonitorDimension: SERVICE

  AnomalySubscription:
    Type: AWS::CE::AnomalySubscription
    Properties:
      SubscriptionName: mem-mcp-cost-anomaly-email
      Threshold: 10
      Frequency: DAILY
      MonitorArnList:
        - !GetAtt AnomalyMonitor.MonitorArn
      Subscribers:
        - Type: EMAIL
          Address: !Ref OperatorEmail

  # ============================================================================
  # CloudWatch Dashboard
  # ============================================================================

  OverviewDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: mem-mcp-overview
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "text",
              "x": 0,
              "y": 0,
              "width": 24,
              "height": 2,
              "properties": {
                "markdown": "# mem-mcp overview\nAlarms below; richer widgets (log insights, memory metrics, embedding performance) land in T-9.6."
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 2,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/EC2", "CPUUtilization", "InstanceId", "${Ec2InstanceId}" ]
                ],
                "period": 300,
                "stat": "Average",
                "region": "${AWS::Region}",
                "title": "EC2 CPU Utilization"
              }
            },
            {
              "type": "alarm",
              "x": 12,
              "y": 2,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "Active Alarms",
                "alarms": [
                  "${AppDownAlarm}",
                  "${CpuHighAlarm}",
                  "${BackupStaleAlarm}",
                  "${BedrockThrottleAlarm}",
                  "${App5xxAlarm}",
                  "${AuthFailSpikAlarm}",
                  "${DcrAttemptsAlarm}",
                  "${TokenReuseAlarm}",
                  "${TenantIsolationTestAlarm}",
                  "${DiskUsageAlarm}",
                  "${SesBounceRateAlarm}",
                  "${QuotaCircuitBreakerAlarm}"
                ]
              }
            }
          ]
        }

Outputs:
  OpsSnsTopicArn:
    Description: SNS topic ARN for ops alerts
    Value: !Ref OpsSnsTopic

  AppLogGroupName:
    Description: CloudWatch log group for application logs
    Value: !Ref AppLogGroup

  WebLogGroupName:
    Description: CloudWatch log group for web logs
    Value: !Ref WebLogGroup

  AuditLogGroupName:
    Description: CloudWatch log group for audit logs
    Value: !Ref AuditLogGroup

  AccessLogGroupName:
    Description: CloudWatch log group for Caddy access logs
    Value: !Ref AccessLogGroup

  PreSignUpLambdaLogGroupName:
    Description: CloudWatch log group for Lambda PreSignUp function
    Value: !Ref PreSignUpLambdaLogGroup

  DashboardUrl:
    Description: CloudWatch dashboard URL
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=mem-mcp-overview'
