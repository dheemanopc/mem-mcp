AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'mem-mcp root stack — composes 8 nested stacks (010-080) and wires post-create dependencies'

Parameters:
  # Domain and subdomain configuration
  DomainName:
    Type: String
    AllowedPattern: '^[a-z0-9]+([-.][a-z0-9]+)*\.[a-z]{2,}$'
    Description: Apex domain (e.g., dheemantech.in)

  MemSysSubdomain:
    Type: String
    Default: memsys
    Description: Subdomain for MCP API server

  MemAppSubdomain:
    Type: String
    Default: memapp
    Description: Subdomain for web UI

  MemAuthSubdomain:
    Type: String
    Default: memauth
    Description: Subdomain for Cognito custom domain

  # Operator and access
  OperatorEmail:
    Type: String
    AllowedPattern: '^[^@\s]+@[^@\s]+\.[^@\s]+$'
    Description: Operator email for SES and SNS notifications

  OperatorIpCidr:
    Type: String
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}/[0-9]{1,2}$'
    Description: CIDR for operator SSH access (e.g., 203.0.113.45/32)

  # EC2 configuration
  Ec2KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 key pair name for SSH access

  Ec2InstanceType:
    Type: String
    Default: t4g.medium
    AllowedValues: [t4g.small, t4g.medium, t4g.large]
    Description: EC2 instance type (ARM64 Graviton2)

  # Retention and logging
  BackupRetentionDays:
    Type: Number
    Default: 730
    MinValue: 30
    MaxValue: 3650
    Description: Days to retain S3 backups

  LogRetentionDays:
    Type: Number
    Default: 30
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90, 120, 150, 180, 365, 400, 545, 731, 1827, 3653]
    Description: Retention for app, web, and access logs

  AuditLogRetentionDays:
    Type: Number
    Default: 90
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90, 120, 150, 180, 365, 400, 545, 731, 1827, 3653]
    Description: Retention for audit logs (PreSignUp Lambda)

  # Encryption and secrets
  KmsKeyAlias:
    Type: String
    Default: alias/mem-mcp
    AllowedPattern: '^alias/[a-zA-Z0-9/_-]+$'
    Description: KMS CMK alias (operator-managed, pre-existing)

  GoogleClientIdSsmName:
    Type: AWS::SSM::Parameter::Name
    Default: /mem-mcp/cognito/google_client_id
    Description: SSM parameter name for Google OAuth client ID

  GoogleClientSecretSsmName:
    Type: AWS::SSM::Parameter::Name
    Default: /mem-mcp/cognito/google_client_secret
    Description: SSM parameter name for Google OAuth client secret

  # DNS and certificates
  HostedZoneId:
    Type: AWS::Route53::HostedZone::Id
    Description: Route 53 hosted zone ID for the domain (operator-managed)

  UsEast1CertArn:
    Type: String
    AllowedPattern: '^arn:aws:acm:us-east-1:\d+:certificate/.+$'
    Description: ACM certificate ARN in us-east-1 for Cognito custom domain (from T-1.9)

  # Bootstrap and budget
  BootstrapBucketName:
    Type: String
    Description: S3 bootstrap bucket name for nested templates and Lambda zips (output from 090-bootstrap-bucket)

  MonthlyBudgetUsd:
    Type: Number
    Default: 50
    MinValue: 10
    MaxValue: 1000
    Description: Monthly AWS cost budget (80% threshold triggers SNS alert)

Resources:
  # ============================================================================
  # 010-network: VPC, subnet, IGW, security group
  # ============================================================================
  NetworkStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://${BootstrapBucketName}.s3.${AWS::Region}.amazonaws.com/nested/010-network.yaml'
      Parameters:
        OperatorIpCidr: !Ref OperatorIpCidr
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-network'
        - Key: Project
          Value: mem-mcp

  # ============================================================================
  # 020-secrets: KMS CMK alias pass-through, SSM placeholders
  # ============================================================================
  SecretsStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://${BootstrapBucketName}.s3.${AWS::Region}.amazonaws.com/nested/020-secrets.yaml'
      Parameters:
        KmsKeyAlias: !Ref KmsKeyAlias
        OperatorEmail: !Ref OperatorEmail
        OperatorIpCidr: !Ref OperatorIpCidr
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-secrets'
        - Key: Project
          Value: mem-mcp

  # ============================================================================
  # 030-storage: S3 backup bucket with versioning, encryption, lifecycle
  # ============================================================================
  StorageStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://${BootstrapBucketName}.s3.${AWS::Region}.amazonaws.com/nested/030-storage.yaml'
      Parameters:
        KmsKeyAlias: !Ref KmsKeyAlias
        BackupRetentionDays: !Ref BackupRetentionDays
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-storage'
        - Key: Project
          Value: mem-mcp

  # ============================================================================
  # 040-identity: Cognito user pool, custom domain, Google IdP, web client
  # ============================================================================
  IdentityStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://${BootstrapBucketName}.s3.${AWS::Region}.amazonaws.com/nested/040-identity.yaml'
      Parameters:
        DomainName: !Ref DomainName
        MemSysSubdomain: !Ref MemSysSubdomain
        MemAppSubdomain: !Ref MemAppSubdomain
        MemAuthSubdomain: !Ref MemAuthSubdomain
        UsEast1CertArn: !Ref UsEast1CertArn
        GoogleClientIdSsmName: !Ref GoogleClientIdSsmName
        GoogleClientSecretSsmName: !Ref GoogleClientSecretSsmName
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-identity'
        - Key: Project
          Value: mem-mcp

  # ============================================================================
  # 050-lambda-presignup: PreSignUp Lambda function (takes Identity outputs)
  # ============================================================================
  LambdaPreSignUpStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://${BootstrapBucketName}.s3.${AWS::Region}.amazonaws.com/nested/050-lambda-presignup.yaml'
      Parameters:
        UserPoolArn: !GetAtt IdentityStack.Outputs.UserPoolArn
        UserPoolId: !GetAtt IdentityStack.Outputs.UserPoolId
        KmsKeyAlias: !Ref KmsKeyAlias
        MemSysSubdomain: !Ref MemSysSubdomain
        DomainName: !Ref DomainName
        LogRetentionDays: !Ref AuditLogRetentionDays
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-lambda-presignup'
        - Key: Project
          Value: mem-mcp

  # ============================================================================
  # 060-compute: EC2, IAM instance profile, EBS, EIP, DLM snapshots
  # ============================================================================
  ComputeStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://${BootstrapBucketName}.s3.${AWS::Region}.amazonaws.com/nested/060-compute.yaml'
      Parameters:
        Ec2InstanceType: !Ref Ec2InstanceType
        Ec2KeyName: !Ref Ec2KeyName
        PublicSubnetId: !GetAtt NetworkStack.Outputs.PublicSubnetId
        SecurityGroupId: !GetAtt NetworkStack.Outputs.SecurityGroupId
        KmsKeyAlias: !Ref KmsKeyAlias
        UserPoolId: !GetAtt IdentityStack.Outputs.UserPoolId
        BackupBucketName: !GetAtt StorageStack.Outputs.BackupBucketName
        DomainName: !Ref DomainName
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-compute'
        - Key: Project
          Value: mem-mcp

  # ============================================================================
  # 070-dns: Route 53 records for memsys, memapp, memauth (AFTER Compute + Identity)
  # ============================================================================
  DnsStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://${BootstrapBucketName}.s3.${AWS::Region}.amazonaws.com/nested/070-dns.yaml'
      Parameters:
        HostedZoneId: !Ref HostedZoneId
        DomainName: !Ref DomainName
        MemSysSubdomain: !Ref MemSysSubdomain
        MemAppSubdomain: !Ref MemAppSubdomain
        MemAuthSubdomain: !Ref MemAuthSubdomain
        ElasticIp: !GetAtt ComputeStack.Outputs.ElasticIp
        CognitoCloudFrontDistribution: !GetAtt IdentityStack.Outputs.CloudFrontDistribution
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-dns'
        - Key: Project
          Value: mem-mcp

  # ============================================================================
  # 080-observability: CloudWatch logs, alarms, SNS, dashboard (AFTER Compute)
  # ============================================================================
  ObservabilityStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://${BootstrapBucketName}.s3.${AWS::Region}.amazonaws.com/nested/080-observability.yaml'
      Parameters:
        OperatorEmail: !Ref OperatorEmail
        Ec2InstanceId: !GetAtt ComputeStack.Outputs.Ec2InstanceId
        KmsKeyAlias: !Ref KmsKeyAlias
        LogRetentionDays: !Ref LogRetentionDays
        AuditLogRetentionDays: !Ref AuditLogRetentionDays
        MonthlyBudgetUsd: !Ref MonthlyBudgetUsd
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-observability'
        - Key: Project
          Value: mem-mcp

  # ============================================================================
  # PreSignUp trigger wiring: custom resource resolves circular dependency
  # Cognito PreSignUp LambdaConfig.PreSignUp must reference Lambda ARN, but
  # we cannot wire it in 040-identity due to circular: 040 creates UserPool,
  # 050 needs UserPoolId, and 040 needs Lambda ARN. Solution: wire it here
  # in root after both stacks exist.
  # ============================================================================

  PreSignUpWiringRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: cognito-update-trigger
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:UpdateUserPool
                  - cognito-idp:DescribeUserPool
                  - lambda:AddPermission
                  - lambda:RemovePermission
                Resource: '*'

  PreSignUpWiringFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-presignup-wiring'
      Runtime: python3.12
      Architectures: [arm64]
      Handler: index.handler
      Role: !GetAtt PreSignUpWiringRole.Arn
      Timeout: 60
      InlineCode: |
        import boto3
        import json
        import urllib.request

        cognito = boto3.client('cognito-idp')

        def send_response(event, status, reason=''):
            body = json.dumps({
                'Status': status,
                'Reason': reason,
                'PhysicalResourceId': event.get('PhysicalResourceId', 'presignup-wiring'),
                'StackId': event['StackId'],
                'RequestId': event['RequestId'],
                'LogicalResourceId': event['LogicalResourceId'],
                'Data': {},
            }).encode('utf-8')
            req = urllib.request.Request(
                event['ResponseURL'],
                data=body,
                method='PUT',
                headers={'Content-Length': str(len(body))}
            )
            urllib.request.urlopen(req).read()

        def handler(event, context):
            try:
                props = event['ResourceProperties']
                pool_id = props['UserPoolId']
                fn_arn = props['LambdaArn']

                if event['RequestType'] in ('Create', 'Update'):
                    cognito.update_user_pool(
                        UserPoolId=pool_id,
                        LambdaConfig={'PreSignUp': fn_arn},
                    )
                elif event['RequestType'] == 'Delete':
                    # Remove trigger on stack delete to allow clean pool deletion
                    cognito.update_user_pool(UserPoolId=pool_id, LambdaConfig={})

                send_response(event, 'SUCCESS')
            except Exception as e:
                send_response(event, 'FAILED', str(e))

  PreSignUpWiring:
    Type: Custom::PreSignUpWiring
    # IdentityStack + LambdaPreSignUpStack deps are implicit via GetAtt below
    Properties:
      ServiceToken: !GetAtt PreSignUpWiringFn.Arn
      UserPoolId: !GetAtt IdentityStack.Outputs.UserPoolId
      LambdaArn: !GetAtt LambdaPreSignUpStack.Outputs.PreSignUpFunctionArn

  # ============================================================================
  # SSM output bridge: write critical values to SSM for EC2 user-data (T-1.11)
  # ============================================================================

  SsmCognitoUserPoolId:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /mem-mcp/cognito/user_pool_id
      Type: String
      Value: !GetAtt IdentityStack.Outputs.UserPoolId
      Tags:
        Project: mem-mcp
        Component: root-bridge

  SsmCognitoWebClientId:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /mem-mcp/cognito/web_client_id
      Type: String
      Value: !GetAtt IdentityStack.Outputs.WebClientId
      Tags:
        Project: mem-mcp
        Component: root-bridge

  SsmResourceServerUrl:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /mem-mcp/resource_url
      Type: String
      Value: !GetAtt IdentityStack.Outputs.ResourceServerIdentifier
      Tags:
        Project: mem-mcp
        Component: root-bridge

  SsmWebUrl:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /mem-mcp/web_url
      Type: String
      Value: !Sub 'https://${MemAppSubdomain}.${DomainName}'
      Tags:
        Project: mem-mcp
        Component: root-bridge

  SsmBackupBucket:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /mem-mcp/backup/bucket
      Type: String
      Value: !GetAtt StorageStack.Outputs.BackupBucketName
      Tags:
        Project: mem-mcp
        Component: root-bridge

  SsmOpsSnsTopicArn:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /mem-mcp/ops/sns_topic_arn
      Type: String
      Value: !GetAtt ObservabilityStack.Outputs.OpsSnsTopicArn
      Tags:
        Project: mem-mcp
        Component: root-bridge

  SsmDomainName:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /mem-mcp/domain_name
      Type: String
      Value: !Ref DomainName
      Tags:
        Project: mem-mcp
        Component: root-bridge

Outputs:
  # EC2 and infrastructure
  Ec2InstanceId:
    Description: EC2 instance ID for mem-mcp host
    Value: !GetAtt ComputeStack.Outputs.Ec2InstanceId
    Export:
      Name: !Sub '${AWS::StackName}-Ec2InstanceId'

  ElasticIp:
    Description: Elastic IP address for EC2
    Value: !GetAtt ComputeStack.Outputs.ElasticIp
    Export:
      Name: !Sub '${AWS::StackName}-ElasticIp'

  # Cognito
  CognitoUserPoolId:
    Description: Cognito User Pool ID
    Value: !GetAtt IdentityStack.Outputs.UserPoolId
    Export:
      Name: !Sub '${AWS::StackName}-CognitoUserPoolId'

  CognitoUserPoolDomain:
    Description: Cognito custom domain
    Value: !GetAtt IdentityStack.Outputs.UserPoolDomain
    Export:
      Name: !Sub '${AWS::StackName}-CognitoUserPoolDomain'

  CognitoWebClientId:
    Description: Cognito web application client ID
    Value: !GetAtt IdentityStack.Outputs.WebClientId
    Export:
      Name: !Sub '${AWS::StackName}-CognitoWebClientId'

  # Storage
  BackupBucketName:
    Description: S3 backup bucket name
    Value: !GetAtt StorageStack.Outputs.BackupBucketName
    Export:
      Name: !Sub '${AWS::StackName}-BackupBucketName'

  # Observability
  OpsSnsTopicArn:
    Description: SNS topic ARN for ops alerts
    Value: !GetAtt ObservabilityStack.Outputs.OpsSnsTopicArn
    Export:
      Name: !Sub '${AWS::StackName}-OpsSnsTopicArn'

  # DNS
  MemSysFqdn:
    Description: Fully qualified domain name for MCP API server
    Value: !Sub '${MemSysSubdomain}.${DomainName}'
    Export:
      Name: !Sub '${AWS::StackName}-MemSysFqdn'

  MemAppFqdn:
    Description: Fully qualified domain name for web UI
    Value: !Sub '${MemAppSubdomain}.${DomainName}'
    Export:
      Name: !Sub '${AWS::StackName}-MemAppFqdn'

  MemAuthFqdn:
    Description: Fully qualified domain name for Cognito custom domain
    Value: !Sub '${MemAuthSubdomain}.${DomainName}'
    Export:
      Name: !Sub '${AWS::StackName}-MemAuthFqdn'
