name: integration

on:
  pull_request:
    paths:
      - "src/mem_mcp/**"
      - "alembic/**"
      - "tests/integration/**"
      - ".github/workflows/integration.yml"
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: mem_test
          POSTGRES_PASSWORD: mem_test
          POSTGRES_DB: mem_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mem_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install Poetry
        run: pip install poetry==1.8.4
      - name: Install dependencies
        run: poetry install
      - name: Apply migrations
        env:
          DATABASE_URL: postgresql://mem_test:mem_test@localhost:5432/mem_test
        run: poetry run alembic upgrade head || true  # Allow until alembic env is wired for CI
      - name: Run integration suite
        env:
          MEM_MCP_TEST_DSN: postgresql://mem_test:mem_test@localhost:5432/mem_test
        # tests/integration may not exist yet; skip cleanly if not
        run: |
          if [ -d tests/integration ]; then
            poetry run pytest tests/integration -v
          else
            echo "tests/integration not yet present; skipping integration suite"
          fi
