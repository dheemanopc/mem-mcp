name: web-build

on:
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/web-build.yml"
  push:
    branches: [main]
    paths:
      - "web/**"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "web/package-lock.json"
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
