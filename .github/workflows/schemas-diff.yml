name: schemas-diff

on:
  pull_request:
    paths:
      - "src/mem_mcp/**/*.py"
      - "docs/schemas/**"
      - "tools/dump_schemas.py"
      - ".github/workflows/schemas-diff.yml"

jobs:
  diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install Poetry
        run: pip install poetry==1.8.4
      - name: Install dependencies
        run: poetry install
      - name: Schemas drift check
        run: poetry run python tools/dump_schemas.py --check
